<div class="app-shell">
  <header class="app-header">
    <h1>Stratygrafia</h1>
    <p class="app-subtitle">Dokumentacja warstw konserwatorskich</p>
  </header>

  <main class="app-main">
    <app-layer-form (layerAdd)="addLayer($event)" />
    <app-layer-form
      sectionTitle="Dodaj warstwę wtórną"
      [fillFromRight]="true"
      (layerAdd)="addLayer($event)"
    />

    <section class="table-section">
      <div class="section-header">
        <h2 class="section-title">
          Przekrój stratygraficzny
          @if (layers().length > 0) {
            <span class="layer-count">{{ layers().length }} {{ layers().length === 1 ? 'warstwa' : 'warstwy/warstw' }}</span>
          }
        </h2>
        @if (layers().length > 0) {
          <button class="btn-export" (click)="exportToWord()" title="Eksportuj do Word (.docx)">
            ⬇ Eksportuj do Word
          </button>
        }
      </div>
      <app-stratigraphy-table
        [layers]="layers()"
        (layerRemove)="removeLayer($event)"
        (layerNumberChange)="reorderLayer($event)"
        (layerThicknessChange)="updateLayerThickness($event)"
        (layerPhaseChange)="updateLayerPhase($event)"
        (layerDatingChange)="updateLayerDating($event)"
        (layerNameChange)="updateLayerName($event)"
      />
    </section>
  </main>
</div>
